<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sofia&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container inter">
        <form class="set-color">
            <label for="color-picker">
                <input id="color-picker" type="color">
            </label>
            <select class="inter" name="mode" id="mode" aria-placeholder="Choose theme">
                <option class="item" value="monochrome">Monochrome</option>
                <option class="item" value="monochrome-dark">Monochrome-dark</option>
                <option class="item" value="monochrome-light">Monochrome-light</option>
                <option class="item" value="analogic">Analogic</option>
                <option class="item" value="complement">Complement</option>
                <option class="item" value="analogic-complement">Analogic-complement</option>
                <option class="item" value="triad">Triad</option>
            </select>
            <button class="inter" id="get-color" type="submit">Get color scheme</button>
        </form>
        <div id="color-scheme-display">
      
    </div>
    <script src="main.js"></script>
</body>
</html>
